kind = "web"
previewPath = "/"
title = "Atendente WhatsApp"
version = "1.0.0"
id = "artifacts/atendente"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24065

[services.development]
run = "pnpm --filter @workspace/atendente run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/atendente", "run", "build" ]
publicDir = "artifacts/atendente/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24065"
BASE_PATH = "/"
